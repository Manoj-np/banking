# Server Configuration
server.port=${PORT:8080}

# --- PRODUCTION & RENDER CONFIGURATION ---
# Render provides DATABASE_URL, but Spring prefers SPRING_DATASOURCE_URL
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/paperless_bank?createDatabaseIfNotExist=true&useSSL=false}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:manoj}

# Hibernate Properties
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# Dialect: Auto-detected by Spring Boot for MySQL or Postgres
# But we can provide a hint for local MySQL

# JWT Security
app.jwt.secret=${JWT_SECRET:9a4f2c8d3e1b7f0a5c6d8e9f1a2b3c4d5e6f7a8b9c0d1e2f3a4b5c6d7e8f9a0b}
app.jwt.expiration-ms=3600000

# Logging
logging.level.com.example.banking=INFO
logging.level.org.hibernate.SQL=ERROR