# Server Configuration
server.port=${PORT:8080}

# --- SMART DATABASE CONFIGURATION ---
# This setup automatically detects if you are in the cloud (Postgres) or local (H2)

# 1. Database URL: Uses Render's DATABASE_URL if it exists, otherwise falls back to H2 In-Memory
spring.datasource.url=${DATABASE_URL:jdbc:h2:mem:paperlessdb;DB_CLOSE_DELAY=-1}

# 2. Driver & Username: These will be ignored by Spring Boot if DATABASE_URL is a full Postgres connection string
spring.datasource.username=${DB_USERNAME:sa}
spring.datasource.password=${DB_PASSWORD:}

# 3. Hibernate Dialect: Automatically determined by Spring Boot 3+ based on the connection
# (We remove explicit dialect to let Hibernate auto-select between H2 and Postgres)

# Hibernate Properties
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# H2 Console (Only active when using H2)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JWT Security
app.jwt.secret=${JWT_SECRET:9a4f2c8d3e1b7f0a5c6d8e9f1a2b3c4d5e6f7a8b9c0d1e2f3a4b5c6d7e8f9a0b}
app.jwt.expiration-ms=3600000

# Logging
logging.level.com.example.banking=INFO
logging.level.org.hibernate.SQL=ERROR