spring.application.name=banking

# H2 Database (Development)
spring.datasource.url=jdbc:h2:file:./data/bankingdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# MySQL Database (Production - uncomment to use)
# spring.datasource.url=jdbc:mysql://localhost:3306/banking_app
# spring.datasource.username=root
# spring.datasource.password=manoj
# spring.datasource.driverClassName=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# JWT Configuration
jwt.secret=mysecretkeymysecretkeymysecretkey12

# Thymeleaf Configuration
spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html

server.port=8080