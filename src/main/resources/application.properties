# Server Configuration
# Use the PORT environment variable if provided by the cloud (Render/Heroku), otherwise default to 8080
server.port=${PORT:8080}

# Database Configuration
# Using a relative path that works better in Docker containers
spring.datasource.url=jdbc:h2:file:./bankingdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Hibernate Properties
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# H2 Console (Disable in production for security, but keeping for your testing)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=true

# JWT Security
# Change this to a long random string in Render Environment Variables for real security
app.jwt.secret=${JWT_SECRET:9a4f2c8d3e1b7f0a5c6d8e9f1a2b3c4d5e6f7a8b9c0d1e2f3a4b5c6d7e8f9a0b}
app.jwt.expiration-ms=3600000

# File Upload/Size Limits
spring.servlet.multipart.max-file-size=2MB
spring.servlet.multipart.max-request-size=2MB

# Logging
logging.level.com.example.banking=INFO
logging.level.org.hibernate.SQL=ERROR