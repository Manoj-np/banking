# Server Configuration
server.port=${PORT:8080}

# Database Configuration (Cloud-Optimized)
# Using In-Memory H2 for maximum compatibility across all cloud providers
spring.datasource.url=jdbc:h2:mem:paperlessdb;DB_CLOSE_DELAY=-1
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# Hibernate Properties
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# H2 Console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=true

# JWT Security
app.jwt.secret=${JWT_SECRET:9a4f2c8d3e1b7f0a5c6d8e9f1a2b3c4d5e6f7a8b9c0d1e2f3a4b5c6d7e8f9a0b}
app.jwt.expiration-ms=3600000

# Logging
logging.level.com.example.banking=INFO
logging.level.org.hibernate.SQL=ERROR