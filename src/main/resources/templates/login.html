<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('NexusBank - Login')}"></head>
<body class="auth-body">
    <div class="auth-container">
        <div class="auth-card" id="loginCard">
            <div class="auth-header">
                <div class="auth-logo">
                    <span class="logo-icon-large">◈</span>
                </div>
                <h1>Welcome Back</h1>
                <p class="auth-subtitle">Sign in to your NexusBank account</p>
            </div>

            <div class="alert alert-error" id="loginError" style="display: none;">
                <span class="alert-icon">⚠</span>
                <span id="loginErrorMsg"></span>
            </div>

            <div class="alert alert-success" id="loginSuccess" style="display: none;">
                <span class="alert-icon">✓</span>
                <span id="loginSuccessMsg"></span>
            </div>

            <form id="loginForm" onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label for="email" class="form-label">Email Address</label>
                    <div class="input-wrapper">
                        <span class="input-icon">✉</span>
                        <input type="email" id="email" name="email" class="form-input" 
                               placeholder="you@example.com" required autocomplete="email">
                    </div>
                </div>

                <div class="form-group">
                    <label for="password" class="form-label">Password</label>
                    <div class="input-wrapper">
                        <span class="input-icon">🔒</span>
                        <input type="password" id="password" name="password" class="form-input" 
                               placeholder="Enter your password" required autocomplete="current-password">
                    </div>
                </div>

                <button type="submit" class="btn btn-primary btn-full" id="loginBtn">
                    <span class="btn-text">Sign In</span>
                    <span class="btn-loader" style="display: none;">⟳</span>
                </button>
            </form>

            <div class="auth-footer">
                <p>Don't have an account? <a href="/register" class="auth-link">Create one</a></p>
            </div>
        </div>

        <div class="auth-decoration">
            <div class="decoration-circle circle-1"></div>
            <div class="decoration-circle circle-2"></div>
            <div class="decoration-circle circle-3"></div>
        </div>
    </div>

    <script th:src="@{/js/app.js}"></script>
    <script>
        // Redirect if already logged in
        if (getToken()) {
            window.location.href = '/dashboard';
        }
    </script>
</body>
</html>
