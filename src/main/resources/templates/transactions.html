<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('NexusBank - Transactions')}"></head>
<body>
    <nav th:replace="~{fragments/layout :: navbar}"></nav>

    <main class="main-content">
        <div class="container">
            <div class="page-header">
                <h1 class="page-title">Transaction History</h1>
                <p class="page-subtitle">View all your past transactions</p>
            </div>

            <div class="section-card" id="transactionsSection">
                <div class="transactions-table-wrapper">
                    <table class="transactions-table" id="transactionsTable">
                        <thead>
                            <tr>
                                <th>Type</th>
                                <th>Counterparty</th>
                                <th>Amount</th>
                                <th>Description</th>
                                <th>Date</th>
                                <th>Status</th>
                            </tr>
                        </thead>
                        <tbody id="transactionsBody">
                            <!-- Populated by JS -->
                        </tbody>
                    </table>
                </div>

                <div class="empty-state" id="noTransactionsHistory" style="display: none;">
                    <span class="empty-icon">📭</span>
                    <p>No transactions found</p>
                    <a href="/transfer" class="btn btn-outline">Make your first transfer</a>
                </div>
            </div>
        </div>
    </main>

    <footer th:replace="~{fragments/layout :: footer}"></footer>

    <script th:src="@{/js/app.js}"></script>
    <script>
        requireAuth();
        loadTransactions();
    </script>
</body>
</html>
