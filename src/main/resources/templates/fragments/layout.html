<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:fragment="head(title)">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${title}">Banking App</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<!-- Navigation Fragment -->
<nav th:fragment="navbar" class="navbar" id="mainNav">
    <div class="nav-container">
        <a href="/dashboard" class="nav-logo">
            <span class="logo-icon">◈</span>
            <span class="logo-text">NexusBank</span>
        </a>
        <div class="nav-links" id="navLinks">
            <a href="/dashboard" class="nav-link" id="navDashboard">
                <span class="nav-icon">⊞</span> Dashboard
            </a>
            <a href="/transfer" class="nav-link" id="navTransfer">
                <span class="nav-icon">⇄</span> Transfer
            </a>
            <a href="/transactions" class="nav-link" id="navTransactions">
                <span class="nav-icon">☰</span> History
            </a>
        </div>
        <div class="nav-right">
            <span class="user-greeting" id="userGreeting">Hello, User</span>
            <button class="btn-logout" id="logoutBtn" onclick="logout()">
                <span>⏻</span> Logout
            </button>
        </div>
    </div>
</nav>

<!-- Footer Fragment -->
<footer th:fragment="footer" class="footer">
    <div class="footer-content">
        <p>&copy; 2026 NexusBank. Secure Digital Banking.</p>
    </div>
</footer>

</body>
</html>
